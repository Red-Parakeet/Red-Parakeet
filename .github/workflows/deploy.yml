name: Deploy Vite Site to GitHub Pages

on:
  push:
    branches: [ "main" ] # Change to "master" if that's your default branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Compile Production Build
        run: npm run build

      # Check if CNAME exists before copying
      - name: Inject Custom Domain CNAME
        run: |
          if [ -f CNAME ]; then
            cp CNAME dist/
            echo "✅ CNAME file copied to dist/"
          else
            echo "⚠️ No CNAME file found in root directory"
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
